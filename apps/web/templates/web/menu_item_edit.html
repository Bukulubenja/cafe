{% extends "web/base.html" %}
{% block title %}{{ item.name }} - Cafe ERP{% endblock %}
{% block content %}
<p class="subtitle"><a href="{% url 'web:menu_item_list' %}">&larr; Back to menu items</a></p>
<h1>Edit {{ item.name }}</h1>

<div class="panel" style="max-width: 32rem;">
  <form method="post">
    {% csrf_token %}
    <div class="field"><label for="id_name">Name</label><input type="text" name="name" id="id_name" value="{{ item.name }}" required></div>
    <div class="field">
      <label for="id_category">Category</label>
      <select name="category" id="id_category" required>
        {% for category in categories %}
        <option value="{{ category.id }}" {% if category.id == item.category_id %}selected{% endif %}>{{ category.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field"><label for="id_selling_price">Selling price (UGX)</label><input type="number" step="0.01" min="0" name="selling_price" id="id_selling_price" value="{{ item.selling_price }}" required></div>
    <div class="field"><label for="id_cost_price">Cost price (UGX)</label><input type="number" step="0.01" min="0" name="cost_price" id="id_cost_price" value="{{ item.cost_price }}"></div>
    <div class="field"><label for="id_vat_rate">VAT rate (%)</label><input type="number" step="0.01" min="0" name="vat_rate" id="id_vat_rate" value="{{ item.vat_rate }}"></div>
    <div class="field"><label for="id_prep_time_minutes">Prep time (minutes)</label><input type="number" min="0" name="prep_time_minutes" id="id_prep_time_minutes" value="{{ item.prep_time_minutes }}"></div>
    <div class="field"><label for="id_points_cost">Loyalty points to redeem (blank = not redeemable)</label><input type="number" min="0" name="points_cost" id="id_points_cost" value="{{ item.points_cost|default_if_none:'' }}"></div>
    <div class="field"><label for="id_description">Description</label><input type="text" name="description" id="id_description" value="{{ item.description }}"></div>
    <div class="field checkbox"><label><input type="checkbox" name="requires_kitchen" {% if item.requires_kitchen %}checked{% endif %}> Requires kitchen prep</label></div>
    <div class="field checkbox"><label><input type="checkbox" name="is_available" {% if item.is_available %}checked{% endif %}> Available on the menu</label></div>
    <button class="btn primary" type="submit">Save changes</button>
  </form>
</div>
{% endblock %}
