{% extends "web/base.html" %}
{% block title %}Log in - Cafe ERP{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="brand-mark">☕ Cafe ERP</div>
  <div class="panel">
    <h1>Log in</h1>
    {% if form.errors %}
    <ul class="messages"><li class="error">Incorrect email or password. Please try again.</li></ul>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="id_username">Email</label>
        <input type="email" name="username" id="id_username" autofocus required autocomplete="username">
      </div>
      <div class="field">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" required autocomplete="current-password">
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button class="btn primary" type="submit" style="width: 100%;">Log in</button>
    </form>
  </div>
</div>
{% endblock %}
